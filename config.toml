[panel]
# 面板进度条上限
basic_stat_max = 100
experience_max = 100

# 面板默认值（配置热更新时会立即应用）
default_stamina = 80
default_satiety = 80
default_thirst = 80
default_mood = 70
default_health = 80
default_affinity = 80
default_experience = 80
default_level = 1
[animation]
# 动画资源根目录（相对/绝对路径都可）
assets_body_root = "assets/body"

# 默认待机动画根目录（会递归扫描其下所有变体目录）
default_happy_idle_variants = [
	"Default/Happy",
]
default_nomal_idle_root = "Default/Nomal"
default_poor_condition_idle_root = "Default/PoorCondition"
default_ill_idle_root = "Default/Ill"
idel_root = "IDEL"
state_root = "State"
switch_up_root = "Switch/Up"
switch_down_root = "Switch/Down"

# 启动与拖拽动画目录
startup_root = "StartUP"
raise_dynamic_root = "Raise/Raised_Dynamic"
raise_static_root = "Raise/Raised_Static"

# 命名规划根目录（按 Happy/Nomal/PoorCondition/Ill 匹配）
pinch_root = "Pinch"
shutdown_root = "Shutdown"
touch_head_root = "Touch_Head"
touch_body_root = "Touch_Body"

# 右边界触发隐藏主动画（像素坐标均为原图坐标，会自动映射到当前显示尺寸）
# 触发判定仅使用 trigger 的横坐标 X（靠右边界）
side_hide_right_main_root = "SideHide_Right_Main"
side_hide_right_rise_root = "SideHide_Right_Rise"
side_hide_right_trigger_pixel_x = 608
side_hide_right_anchor_pixel_x = 570
side_hide_right_anchor_pixel_y = 583
side_hide_right_trigger_tolerance_px = 2

# 左边界触发隐藏主动画（判定使用 trigger 的横坐标 X，靠左边界）
side_hide_left_main_root = "SideHide_Left_Main"
side_hide_left_rise_root = "SideHide_Left_Rise"
side_hide_left_trigger_pixel_x = 470
side_hide_left_anchor_pixel_x = 470
side_hide_left_anchor_pixel_y = 583
side_hide_left_trigger_tolerance_px = 2
